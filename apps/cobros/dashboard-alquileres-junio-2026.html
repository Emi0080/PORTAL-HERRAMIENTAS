<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Alquileres — The Group Developers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F9F5EC;color:#1A1A1A;min-height:100vh}
.page-header{background:#fff;border-bottom:1px solid #E5DCC8;padding:1.5rem 2rem;display:flex;align-items:center;gap:1.25rem}
.logo-mark{width:42px;height:42px;border:1.5px solid #C9A84C;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;color:#C9A84C;flex-shrink:0}
.page-header h1{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:#1A1A1A;letter-spacing:.01em}
.page-header p{font-size:12px;color:#6B7280;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 3rem}
.page-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#8B6914;margin-bottom:1.25rem}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem}
.proj-card{background:#fff;border:1px solid #E5DCC8;border-radius:14px;padding:1.25rem;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.proj-card:hover{border-color:#C9A84C;box-shadow:0 2px 12px rgba(201,168,76,.12)}
.proj-name{font-size:13px;font-weight:500;color:#1A1A1A;margin-bottom:8px}
.proj-meta{font-size:12px;color:#6B7280;display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.proj-total{font-size:20px;font-weight:600;color:#C9A84C;margin-bottom:6px}
.proj-badge{font-size:11px;color:#9CA3AF}
.back-btn{background:transparent;border:1px solid #E5DCC8;border-radius:10px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#8B6914;cursor:pointer;margin-bottom:1.25rem;display:inline-flex;align-items:center;gap:6px;transition:background .2s,color .2s}
.back-btn:hover{background:#C9A84C;color:#fff;border-color:#C9A84C}
.detail-header{margin-bottom:1rem}
.detail-header h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:#1A1A1A;margin-bottom:4px}
.detail-sub{font-size:12px;color:#6B7280}
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.sum-card{background:#fff;border:1px solid #E5DCC8;border-radius:10px;padding:12px 14px}
.sum-card.gold .sum-val{color:#C9A84C}
.sum-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9CA3AF;margin-bottom:4px}
.sum-val{font-size:20px;font-weight:600;color:#1A1A1A}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #E5DCC8}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:9px 14px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9CA3AF;background:#F9F5EC;border-bottom:1px solid #E5DCC8}
thead th.num{text-align:right}
tbody td{padding:10px 14px;border-bottom:1px solid #F3EDE0;color:#4B5563}
tbody tr:last-child td{border-bottom:none}
tbody tr.no-debt td{opacity:0.5}
tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
tbody td.num.has-amount{color:#8B6914;font-weight:500}
tbody td.total-col{text-align:right;font-weight:500;font-variant-numeric:tabular-nums}
tbody td.total-col.has-debt{color:#C9A84C}
tbody td.obs-col{min-width:160px;max-width:220px}
.obs-input{width:100%;font-size:12px;border:1px solid transparent;border-radius:4px;padding:4px 6px;background:transparent;color:#1A1A1A;font-family:inherit;transition:border-color .15s,background .15s}
.obs-input:hover{border-color:#E5DCC8;background:#FDF8EF}
.obs-input:focus{border-color:#C9A84C;background:#FDF8EF;outline:none}
.view{display:none}
.view.active{display:block}
</style>
</head>
<body>
<header class="page-header">
  <div class="logo-mark">TG</div>
  <div>
    <h1>Dashboard de Alquileres</h1>
    <p>The Group Developers · Saldos pendientes</p>
  </div>
</header>
<main class="main">
  <div id="view-list" class="view active">
    <div class="page-title">Proyectos con saldos pendientes</div>
    <div class="proj-grid" id="proj-grid"></div>
  </div>
  <div id="view-detail" class="view">
    <button class="back-btn" onclick="showList()">← Todos los proyectos</button>
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <div class="detail-sub" id="detail-sub"></div>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="table-wrap"><table><thead id="detail-thead"></thead><tbody id="detail-tbody"></tbody></table></div>
  </div>
</main>

const MONTHS = DATA.months;
const fmt = v => v > 0 ? '$' + v.toLocaleString('es-PA',{minimumFractionDigits:2,maximumFractionDigits:2}) : '';
const fmtBig = v => '$' + v.toLocaleString('es-PA',{minimumFractionDigits:2,maximumFractionDigits:2});

function getObs(proj,idx){try{return localStorage.getItem('obs_'+proj+'_'+idx)||''}catch(e){return ''}}
function setObs(proj,idx,val){try{localStorage.setItem('obs_'+proj+'_'+idx,val)}catch(e){}}

function projTotal(p){return DATA.projects[p].reduce((s,c)=>s+c.total,0)}
function projDebtCount(p){return DATA.projects[p].filter(c=>c.total>0).length}

function showList(){
  document.getElementById('view-list').classList.add('active');
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-list').style.display='';
  document.getElementById('view-detail').style.display='none';
}

function showDetail(pname){
  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='';
  document.getElementById('detail-title').textContent=pname;
  const clients=DATA.projects[pname];
  const grandTotal=clients.reduce((s,c)=>s+c.total,0);
  const activeMths=MONTHS.filter(m=>clients.some(c=>c.months[m]));
  const withDebt=clients.filter(c=>c.total>0).length;
  const moreMonths=clients.filter(c=>Object.keys(c.months).length>1).length;
  document.getElementById('detail-sub').textContent=clients.length+' inquilinos en total · '+withDebt+' con saldo pendiente · '+activeMths.join(', ');
  document.getElementById('summary-bar').innerHTML=`
    <div class="sum-card gold"><div class="sum-label">Total adeudado</div><div class="sum-val">${fmtBig(grandTotal)}</div></div>
    <div class="sum-card"><div class="sum-label">Inquilinos con deuda</div><div class="sum-val">${withDebt}</div></div>
    <div class="sum-card"><div class="sum-label">Total inquilinos</div><div class="sum-val">${clients.length}</div></div>
    <div class="sum-card"><div class="sum-label">Múltiples meses</div><div class="sum-val">${moreMonths}</div></div>
  `;
  const shortMth=m=>{const p=m.split(' ');const a={'Enero':'Ene','Febrero':'Feb','Marzo':'Mar','Abril':'Abr','Mayo':'May','Junio':'Jun','Julio':'Jul','Agosto':'Ago','Septiembre':'Sep','Octubre':'Oct','Noviembre':'Nov','Diciembre':'Dic'};return(a[p[0]]||p[0])+' '+p[1]};
  let hrow='<tr><th>Cliente</th><th>Unidad</th>';
  activeMths.forEach(m=>{hrow+=`<th class="num">${shortMth(m)}</th>`});
  hrow+='<th class="num">Total adeudado</th><th>Observaciones</th></tr>';
  document.getElementById('detail-thead').innerHTML=hrow;
  const tbody=document.getElementById('detail-tbody');
  tbody.innerHTML='';
  clients.forEach((c,i)=>{
    const tr=document.createElement('tr');
    if(c.total===0) tr.className='no-debt';
    let cells=`<td style="color:#1A1A1A;font-weight:500">${c.client}</td><td>${c.unit}</td>`;
    activeMths.forEach(m=>{const v=c.months[m]||0;cells+=`<td class="num${v>0?' has-amount':''}">${v>0?fmt(v):''}</td>`});
    cells+=`<td class="total-col${c.total>0?' has-debt':''}">${c.total>0?fmtBig(c.total):'$0.00'}</td>`;
    const savedObs=(getObs(pname,i)||'').replace(/"/g,'&quot;');
    cells+=`<td class="obs-col"><input class="obs-input" type="text" placeholder="Agregar observación..." value="${savedObs}" data-proj="${pname}" data-idx="${i}"/></td>`;
    tr.innerHTML=cells;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('.obs-input').forEach(inp=>{
    inp.addEventListener('input',e=>{setObs(e.target.dataset.proj,e.target.dataset.idx,e.target.value)});
  });
}

function buildList(){
  const grid=document.getElementById('proj-grid');
  grid.innerHTML='';
  Object.keys(DATA.projects).forEach(pname=>{
    const total=projTotal(pname);
    const nDebt=projDebtCount(pname);
    const nTotal=DATA.projects[pname].length;
    const mesesActivos=MONTHS.filter(m=>DATA.projects[pname].some(c=>c.months[m])).length;
    const card=document.createElement('div');
    card.className='proj-card';
    card.innerHTML=`<div class="proj-name">${pname}</div><div class="proj-meta"><span>${nDebt} con pendiente de ${nTotal} inquilinos</span><span>${mesesActivos} mes${mesesActivos>1?'es':''} con deuda</span></div><div class="proj-total">${fmtBig(total)}</div><span class="proj-badge">Ver detalle →</span>`;
    card.addEventListener('click',()=>showDetail(pname));
    grid.appendChild(card);
  });
}

showList();
buildList();
document.getElementById('view-detail').style.display='none';
</script>
</body>
</html>
