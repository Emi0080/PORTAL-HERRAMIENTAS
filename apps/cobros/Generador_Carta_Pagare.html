<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Carta - Solicitud de Pagaré</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --navy:#1a1a3e; --purple:#6b4e9e; --lila:#9b7fc4;
    --bg:#f4f2f8; --card:#ffffff; --line:#e3dcef; --text:#2a2438; --muted:#7a7390;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:24px;line-height:1.5}
  .wrap{max-width:680px;margin:0 auto}
  .head{text-align:center;margin-bottom:28px}
  .head h1{color:var(--navy);font-size:1.5rem;font-weight:700}
  .head p{color:var(--muted);font-size:.92rem;margin-top:6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:0 4px 20px rgba(107,78,158,.07)}
  label{display:block;font-weight:600;font-size:.9rem;margin:18px 0 7px;color:var(--navy)}
  label:first-of-type{margin-top:0}
  input,select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:1rem;color:var(--text);background:#fbfaff;transition:border .15s}
  input:focus,select:focus{outline:none;border-color:var(--purple)}
  .hint{font-size:.8rem;color:var(--muted);margin-top:5px}
  .preview{background:#f7f5fb;border:1px dashed var(--lila);border-radius:10px;padding:14px 16px;margin-top:8px;font-size:.92rem;color:var(--purple);min-height:46px;font-style:italic}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .row>div{flex:1;min-width:160px}
  button{width:100%;margin-top:26px;padding:15px;background:linear-gradient(135deg,var(--purple),var(--navy));color:#fff;border:none;border-radius:12px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:transform .12s,box-shadow .2s}
  button:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(107,78,158,.3)}
  button:active{transform:translateY(0)}
  .ok{background:#e8f7ee;border:1px solid #aadcc0;color:#1c7a45;padding:13px;border-radius:10px;margin-top:16px;display:none;font-size:.92rem;text-align:center}
  .err{background:#fdecec;border:1px solid #f0b4b4;color:#b23030;padding:13px;border-radius:10px;margin-top:16px;display:none;font-size:.92rem;text-align:center}
  .foot{text-align:center;color:var(--muted);font-size:.78rem;margin-top:22px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>Solicitud de Pagaré</h1>
    <p>Generador de carta · Esco Equipos, S.A.</p>
  </div>
  <div class="card">
    <label>Fecha de la carta</label>
    <input type="date" id="fecha">
    <div class="hint">Se escribirá como: <span id="fechaTxt">Panamá, … del …</span></div>

    <label>Banco</label>
    <select id="banco" onchange="syncCuenta()">
      <option value="">— Seleccioná un banco —</option>
      <option value="Banco General" data-cuenta="03-01-01-145593-2">Banco General</option>
      <option value="BICSA" data-cuenta="275231">BICSA</option>
      <option value="Global Bank" data-cuenta="45101251654">Global Bank</option>
    </select>

    <label>Número de cuenta</label>
    <input type="text" id="cuenta" placeholder="Se completa al elegir el banco">
    <div class="hint">Se autocompleta, pero podés editarlo si hace falta.</div>

    <div class="row">
      <div>
        <label>Monto (US$)</label>
        <input type="text" id="monto" inputmode="decimal" placeholder="351760.80" oninput="updateMonto()">
      </div>
    </div>
    <div class="hint">En letras:</div>
    <div class="preview" id="montoTxt">…</div>

    <button onclick="generar()">📄 Generar carta (.docx)</button>
    <div class="ok" id="ok"></div>
    <div class="err" id="err"></div>
  </div>
  <div class="foot">El plazo (180 días) y los datos del representante son fijos. El formato y membrete originales se mantienen.</div>
</div>

const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

// ---- Número a letras (español, montos) ----
const UNI = ["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve","diez","once","doce","trece","catorce","quince","dieciséis","diecisiete","dieciocho","diecinueve","veinte","veintiuno","veintidós","veintitrés","veinticuatro","veinticinco","veintiséis","veintisiete","veintiocho","veintinueve"];
const DEC = ["","","","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
const CEN = ["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];

function seccion(n){ // 0..999
  if(n===0) return "";
  if(n===100) return "cien";
  let s="";
  const c=Math.floor(n/100), resto=n%100;
  if(c>0) s+=CEN[c];
  if(resto>0){
    if(s) s+=" ";
    if(resto<30) s+=UNI[resto];
    else{
      const d=Math.floor(resto/10), u=resto%10;
      s+=DEC[d];
      if(u>0) s+=" y "+UNI[u];
    }
  }
  return s;
}

// apócope: "uno"->"un", "veintiuno"->"veintiún" (antes de mil/millón o de sustantivo masc.)
function apocopar(s){
  return s.replace(/veintiuno$/,"veintiún").replace(/(^|\s)uno$/,"$1un");
}

function enteroALetras(n){
  if(n===0) return "cero";
  let palabras="";
  const millones=Math.floor(n/1000000);
  const miles=Math.floor((n%1000000)/1000);
  const cientos=n%1000;
  if(millones>0){
    palabras += (millones===1)?"un millón":(apocopar(seccion(millones))+" millones");
  }
  if(miles>0){
    if(palabras) palabras+=" ";
    palabras += (miles===1)?"mil":(apocopar(seccion(miles))+" mil");
  }
  if(cientos>0){
    if(palabras) palabras+=" ";
    palabras += seccion(cientos);
  }
  return palabras;
}

function montoEnLetras(valor){
  // valor: number
  const entero=Math.floor(valor);
  const centavos=Math.round((valor-entero)*100);
  const cc=String(centavos).padStart(2,"0");
  // apócope final antes de "dólares" (masculino)
  let letras=apocopar(enteroALetras(entero))+" dólares con "+cc+"/100";
  return letras;
}

function fmtUSD(valor){
  return "US$"+valor.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function parseMonto(){
  let raw=(document.getElementById("monto").value||"").replace(/[^0-9.]/g,"");
  if(raw==="") return null;
  const v=parseFloat(raw);
  if(isNaN(v)) return null;
  return v;
}

function updateMonto(){
  const v=parseMonto();
  const box=document.getElementById("montoTxt");
  if(v===null){ box.textContent="…"; return; }
  box.textContent = montoEnLetras(v)+" ("+fmtUSD(v)+")";
}

function syncCuenta(){
  const sel=document.getElementById("banco");
  const opt=sel.options[sel.selectedIndex];
  const c=opt?opt.getAttribute("data-cuenta"):"";
  if(c) document.getElementById("cuenta").value=c;
}

function fechaEnTexto(){
  const f=document.getElementById("fecha").value;
  if(!f) return null;
  const [y,m,d]=f.split("-").map(Number);
  return "Panamá, "+d+" de "+MESES[m-1]+" del "+y;
}

document.getElementById("fecha").addEventListener("change",()=>{
  const t=fechaEnTexto();
  document.getElementById("fechaTxt").textContent = t||"Panamá, … del …";
});

function b64ToBytes(b64){
  const bin=atob(b64);
  const len=bin.length;
  const bytes=new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}

function escXml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function generar(){
  const ok=document.getElementById("ok"), err=document.getElementById("err");
  ok.style.display="none"; err.style.display="none";

  const fechaTxt=fechaEnTexto();
  const banco=document.getElementById("banco").value.trim();
  const cuenta=document.getElementById("cuenta").value.trim();
  const v=parseMonto();

  if(!fechaTxt){ err.textContent="Seleccioná la fecha."; err.style.display="block"; return; }
  if(!banco){ err.textContent="Seleccioná el banco."; err.style.display="block"; return; }
  if(!cuenta){ err.textContent="Falta el número de cuenta."; err.style.display="block"; return; }
  if(v===null||v<=0){ err.textContent="Ingresá un monto válido."; err.style.display="block"; return; }

  const montoLetras = montoEnLetras(v)+" ("+fmtUSD(v)+")";

  try{
    const zip=await JSZip.loadAsync(b64ToBytes(TEMPLATE_B64));
    let xml=await zip.file("word/document.xml").async("string");

    // 1) Fecha
    xml=xml.replace("Panamá, 29 de diciembre del 2025", escXml(fechaTxt));
    // 2) Banco (va junto con <w:br/>Ciudad)
    xml=xml.replace("<w:t>Banco General</w:t>", "<w:t>"+escXml(banco)+"</w:t>");
    // 3) Cuenta
    xml=xml.replace("<w:t>03-01-01-145593-2</w:t>", "<w:t>"+escXml(cuenta)+"</w:t>");
    // 4) Monto en letras (run en cursiva)
    xml=xml.replace(
      "<w:t>trescientos cincuenta y un mil setecientos sesenta dólares con 80/100 (US$351,760.80)</w:t>",
      "<w:t>"+escXml(montoLetras)+"</w:t>"
    );

    zip.file("word/document.xml", xml);
    const blob=await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});

    const fechaArchivo=document.getElementById("fecha").value;
    const nombre="Carta_pagare_"+banco.replace(/\s+/g,"_")+"_"+fechaArchivo+".docx";
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=nombre; a.click();
    URL.revokeObjectURL(url);

    ok.innerHTML="✓ Carta generada: <b>"+nombre+"</b>";
    ok.style.display="block";
  }catch(e){
    err.textContent="Error al generar: "+e.message;
    err.style.display="block";
  }
}

// init
(function(){
  const t=new Date();
  document.getElementById("fecha").value=t.toISOString().slice(0,10);
  document.getElementById("fechaTxt").textContent=fechaEnTexto();
})();
</script>
